<!DOCTYPE html>
<html class="dark" lang="zh-Hant-TW">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Complete Your Checkout | Future Sam</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "outline-variant": "#5c4037",
          "surface-variant": "#353534",
          "on-surface-variant": "#e6beb2",
          "surface-container": "#201f1f",
          "outline": "#ad897e",
          "on-background": "#e5e2e1",
          "primary-container": "#ff571a",
          "background": "#131313",
          "surface-container-high": "#2a2a2a",
          "primary-fixed-dim": "#ffb59e",
          "primary": "#ffb59e",
          "surface-container-lowest": "#0e0e0e",
          "surface-container-low": "#1c1b1b",
          "on-surface": "#e5e2e1",
          "surface-container-highest": "#353534",
          "secondary-container": "#454747",
          "secondary": "#c6c6c7",
          "on-secondary-container": "#b4b5b5",
          "surface": "#131313",
          "on-primary": "#5e1700",
        },
        borderRadius: {
          "DEFAULT": "0.125rem",
          "lg": "0.25rem",
          "xl": "0.5rem",
          "full": "0.75rem"
        },
        fontFamily: {
          "headline": ["Inter"],
          "display": ["Inter"],
          "body": ["Inter"],
          "label": ["Inter"]
        }
      }
    }
  }
</script>
<style>
  body {
    background-color: #131313;
    color: #e5e2e1;
    font-family: 'Inter', sans-serif;
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
  }
  /* White card wrapper so Stripe button renders properly on dark bg */
  .stripe-wrapper {
    background-color: #ffffff;
    border-radius: 12px;
    padding: 32px 24px;
    width: 100%;
  }
</style>
</head>

<body class="antialiased flex flex-col min-h-screen">

<main class="flex-grow flex items-center justify-center px-6 py-16">
  <div class="w-full max-w-md text-center flex flex-col items-center">

    <!-- Brand Identity -->
    <div class="mb-8">
      <h2 class="font-headline font-bold text-[12px] tracking-[0.2em] uppercase text-on-surface-variant mb-2">
        未來山姆 | Future Sam
      </h2>
      <p class="font-body text-[14px] text-outline tracking-wider">
        全球收入來源系統
      </p>
    </div>

    <!-- Page Headline -->
    <h1 class="font-headline font-semibold text-[20px] md:text-[24px] text-on-surface mb-12 tracking-tight">
      Complete Your Checkout | 完成結帳
    </h1>

    <!-- Stripe Buy Button (wrapped in white card for rendering) -->
    <div class="stripe-wrapper">
      <script async src="https://js.stripe.com/v3/buy-button.js"></script>
      <stripe-buy-button
        buy-button-id="buy_btn_1TWssDEIIg2UAF3koolcwUsR"
        publishable-key="pk_live_51Rms2kEIIg2UAF3kVGQOd71xgFUSEPTEuAo7tK1ukY0Ws5kt2iZB88yKxwP8gqQxHttMUExcXk7NSRIQ3txA9zK500ePnudWHF">
      </stripe-buy-button>
    </div>

    <!-- Security Trust Badge -->
    <div class="mt-8 flex items-center gap-2 text-on-surface-variant/50">
      <span class="material-symbols-outlined text-[18px]">lock</span>
      <span class="font-label text-[11px] tracking-widest uppercase">Secure Transaction</span>
    </div>

  </div>
</main>

<!-- Footer -->
<footer class="w-full flex flex-col items-center justify-center px-6 py-12 border-t border-white/5">
  <div class="text-[10px] font-label font-semibold tracking-[0.15em] text-on-surface-variant/40 uppercase">
    Future Sam © 2026
  </div>
  <div class="mt-4 flex gap-4 text-[10px] font-label text-on-surface-variant/30">
    <span class="hover:text-primary transition-colors cursor-pointer">Privacy Policy</span>
    <span class="hover:text-primary transition-colors cursor-pointer">Terms of Service</span>
  </div>
</footer>

</body>
</html>
